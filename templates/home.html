{{ block "HomePage" .}}
<link rel="stylesheet" href="/static/style.css">

<div class="h-screen flex flex-col overflow-hidden dark:bg-gray-900 bg-gray-50">
    <!-- Menu bar section -->
    <div class="flex flex-row justify-between items-center p-2 bg-gray-100 dark:bg-gray-800 px-4 gap-4 dark:text-white border-b dark:border-gray-700 shrink-0">
        <!-- Logo and Menu button -->
        <div class="text-sm md:text-lg font-medium cursor-pointer"> {{.Title}} </div>
        <!-- Display the roomId dynamically -->
        <div id="roomIdDisplay" class="text-xs text-gray-700 dark:text-gray-300">
            Room ID:
            {{ if .Room.RoomID }}
            <span id="roomId" class="text-green-700 font-medium dark:text-green-500">
                {{ .Room.RoomID }}
            </span>
            <button onclick="copyJoinLink('{{ .Room.RoomID }}')" class="ml-2 text-xs bg-blue-100 hover:bg-blue-200 text-blue-800 font-semibold py-1 px-2 rounded dark:bg-blue-900 dark:text-blue-300 dark:hover:bg-blue-800 transition-colors" id="copyLinkBtn">
                Copy Link
            </button>
            {{ else }}
            <span id="roomId" class="text-red-600">
                None
            </span>
            {{ end }}

        </div>
        <div class="flex text-xs hidden md:block text-sm flex-row gap-1 text-green-700 p-1 rounded-lg dark:text-white">
            <div>Online:</div>
            <div id="joinedUser" class="text-green-700 font-medium dark:text-green-500">@muagerra</div>
        </div>
        <span class="htmx-indicator">
            Searching...
        </span>
        <div class="w-[400px] relative">
            <input type="search" id="questionTitleSlug" name="questionTitleSlug" 
                hx-post="/api/suggestions"
                hx-trigger="input changed delay:300ms" 
                hx-target="#suggestionsContainer"
                hx-indicator=".htmx-indicator"
                class="form-control w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                placeholder="Type questions slug e.g two-sum, and hit enter" 
                onkeydown="if(event.key==='Enter') { htmx.ajax('POST', '/api/search', {values: {questionTitleSlug: this.value}, target: '#questionBlock', swap: 'outerHTML'}); document.getElementById('suggestionsContainer').innerHTML = ''; }"
                autocomplete="off" required />
            <div id="suggestionsContainer"></div>
        </div>
        
        <!-- Choose language options -->
        <select id="programmingLanguages"
            class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500">
            <option value="select language">Choose Language</option>
            {{ range .SupportedProgrammingLangs }}
            <option value="{{ . }}"> {{.}} </option>
            {{ end }}
        </select>

        <!-- run code & call controls -->
        <div class="flex items-center gap-2">
            <button id="run-code-btn"
                class="px-3 py-1 bg-red-600 text-white cursor-pointer rounded-lg hover:bg-red-700 shadow-lg transition-colors text-xs font-medium dark:bg-red-600 dark:hover:bg-red-700"
                type="submit">
                Run code
            </button>
            <div id="callControls" class="flex items-center gap-2">
                <!-- Populated by WebSocketClient.createAudioControls -->
            </div>
        </div>
    </div>

    <!-- Main Section area -->
    <div id="mainSectionMultiplayer"
        class="flex flex-col md:flex-row flex-1 overflow-hidden items-start justify-start px-2 dark:text-white">
        <div id="leftPane" class="h-full overflow-y-auto overflow-x-hidden min-w-[200px] w-[550px] shrink-0 p-2 scrollbar-thin">
            {{ template "QuestionBlock" }}
        </div>
        
        <!-- Draggable Separator -->
        <div id="dragbar" class="w-1.5 md:w-2 cursor-col-resize bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-500 shrink-0 h-full z-10 hidden md:block select-none transition-colors"></div>

        <div id="rightPane" class="flex-1 w-full h-full overflow-hidden min-w-[200px]">
            {{template "CodeBox"}}
        </div>
    </div>
    <!-- Main Section area -->
</div>

<script>
    (function initDragbar() {
        const dragbar = document.getElementById('dragbar');
        const leftPane = document.getElementById('leftPane');
        const rightPane = document.getElementById('rightPane');
        const container = document.getElementById('mainSectionMultiplayer');
        
        if (!dragbar || !leftPane || !rightPane || !container) return;
        
        let isDragging = false;
        
        dragbar.addEventListener('mousedown', (e) => {
            isDragging = true;
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none'; // Prevent text selection
            
            // Disable pointer events on panes to prevent CodeMirror/iframes from stealing mousemove/mouseup
            leftPane.style.pointerEvents = 'none';
            rightPane.style.pointerEvents = 'none';
        });
        
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const containerRect = container.getBoundingClientRect();
            // Calculate relative position inside the container
            let newWidth = e.clientX - containerRect.left;
            
            // Constrain limits
            const minWidth = 200;
            const maxWidth = containerRect.width - 200; // Leave space for code editor
            
            if (newWidth < minWidth) newWidth = minWidth;
            if (newWidth > maxWidth) newWidth = maxWidth;
            
            leftPane.style.width = `${newWidth}px`;
            leftPane.style.flexBasis = `${newWidth}px`;
        });
        
        document.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
                
                // Re-enable pointer events
                leftPane.style.pointerEvents = '';
                rightPane.style.pointerEvents = '';
                
                // Refresh CodeMirror so it adapts properly to new container size
                const cmElement = document.querySelector('.CodeMirror');
                if (cmElement && cmElement.CodeMirror) {
                    cmElement.CodeMirror.refresh();
                }
            }
        });
    })();

    function copyJoinLink(roomId) {
        const link = window.location.origin + "/?room_id=" + roomId;
        navigator.clipboard.writeText(link).then(() => {
            const btn = document.getElementById('copyLinkBtn');
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            btn.classList.add('bg-green-100', 'text-green-800', 'dark:bg-green-900', 'dark:text-green-300');
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('bg-green-100', 'text-green-800', 'dark:bg-green-900', 'dark:text-green-300');
            }, 2000);
        }).catch(err => {
            console.error('Failed to copy: ', err);
        });
    }
</script>
<script src="/static/javascript/codebox.js"></script>

{{end}}
